<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Whisk Automator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; width: 380px; box-sizing: border-box; }
    h3 { margin: 0 0 8px 0; font-size: 15px; }
    textarea { width: 100%; height: 220px; box-sizing: border-box; padding: 8px; font-size: 13px; }
    .row { display:flex; gap:8px; margin-top:8px; }
    button { flex:1; padding: 10px; font-size: 14px; cursor:pointer; }
    .small { font-size: 12px; color:#666; margin-top:6px; }
  </style>
</head>
<body>
  <div style="text-align:center; margin-bottom:10px;">
  <img src="banner.svg" alt="Whisk Automator" style="width:100%; border-radius:8px;">
</div>
  <h3>Paste prompts (one per line or numbered list)</h3>
  <textarea id="promptList" placeholder="1. A minimalist line art fish icon\n2. Grilled steak line art..."></textarea>
  <div class="row">
    <button id="startBtn">Start Automation</button>
    <button id="testBtn">Test Selectors</button>
  </div>
  <div class="small">Open Whisk in the active tab and make sure the prompt area is visible.</div>
  <script src="popup.js"></script>
</body>
</html>
